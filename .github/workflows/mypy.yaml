name: MyPy

on:
  push:
    branches:
      - 'main'
    paths:
      - 'subdomain_watcher/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/mypy.yaml'

permissions:
  contents: read

jobs:
  mypy:
    name: MyPy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install

      - name: Run MyPy
        run: |
          uv sync
          uv run mypy subdomain_watcher/
